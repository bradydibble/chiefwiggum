name: ChiefWiggum Validation Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio

    - name: Run validation suite
      run: |
        chmod +x tests/run_validation_suite.sh
        ./tests/run_validation_suite.sh

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          pytest-results/
          .pytest_cache/
        retention-days: 7

    - name: Run individual test suites
      if: failure()
      run: |
        echo "Running individual test suites for debugging..."
        python -m pytest tests/test_response_analyzer.py -v
        python -m pytest tests/test_spawner_lifecycle.py::TestTaskCompletionDetection -v
        python -m pytest tests/test_coordination.py::TestCompleteAndClaimNext -v
        python -m pytest tests/test_fix_plan_writer.py -v

  coverage:
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies with coverage
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio pytest-cov

    - name: Run tests with coverage
      run: |
        python -m pytest \
          tests/test_response_analyzer.py \
          tests/test_spawner_lifecycle.py::TestTaskCompletionDetection \
          tests/test_coordination.py::TestCompleteAndClaimNext \
          tests/test_fix_plan_writer.py \
          --cov=chiefwiggum \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term

    - name: Upload coverage reports
      uses: codecov/codecov-action@v4
      if: always()
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        flags: validation-tests
        name: validation-coverage

    - name: Archive coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: htmlcov/
        retention-days: 30
